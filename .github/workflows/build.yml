name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Download SpoofDPI Windows binary
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          # SpoofDPI v1.2.1 Windows amd64 binary indir
          curl -L --retry 3 \
            "https://github.com/xvzc/SpoofDPI/releases/download/v1.2.1/spoofdpi-windows-amd64.zip" \
            -o spoofdpi.zip
          unzip -o spoofdpi.zip -d spoofdpi-extracted/
          # Binary'i bul ve kopyala
          find spoofdpi-extracted/ -name "*.exe" | head -1 | xargs -I{} cp {} src-tauri/binaries/bypax-proxy.exe
          cp src-tauri/binaries/bypax-proxy.exe "src-tauri/binaries/bypax-proxy-x86_64-pc-windows-msvc.exe"
          echo "Binary hazır:"
          ls -lh src-tauri/binaries/

      - name: Update proxy icon (change-icon.js)
        shell: bash
        run: node change-icon.js || echo "Icon update skipped (non-critical)"

      - name: Download Npcap installer
        shell: bash
        run: |
          curl -L --retry 3 --max-time 60 \
            "https://npcap.com/dist/npcap-1.79.exe" \
            -o "src-tauri/binaries/npcap-installer.exe" \
            --user-agent "Mozilla/5.0"
          ls -lh src-tauri/binaries/npcap-installer.exe

      - name: Build frontend (vite)
        run: npx vite build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v1.0.0
          releaseName: 'DarknesDPI v1.0.0'
          releaseBody: 'Windows için DPI bypass uygulaması.'
          releaseDraft: false
          prerelease: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DarknesDPI-Windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          retention-days: 7
